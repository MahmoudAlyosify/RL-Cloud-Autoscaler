name: rl-cloud-autoscaler
channels:
  - conda-forge
  - defaults
dependencies:
  # Python version
  - python=3.10

  # Core ML & RL dependencies
  - stable-baselines3::stable-baselines3
  - gymnasium
  - numpy>=1.21.0
  - scipy>=1.7.0
  - pandas>=1.3.0
  
  # Plotting & Visualization
  - matplotlib>=3.4.0
  - seaborn>=0.11.0
  
  # Utilities
  - optuna  # For hyperparameter optimization
  - tensorboard>=2.8.0
  
  # Development tools
  - jupyter>=1.0.0
  - ipython>=7.0.0
  
  # Optional: GPU support (uncomment if using CUDA)
  # - pytorch::pytorch::pytorch-cuda=11.8
  
  # Pip dependencies
  - pip
  - pip:
    - stable-baselines3
    - gymnasium[classic_control]
    - optuna
    - tensorboard
